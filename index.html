<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <!-- Primary Meta Tags -->
    <title>LISH — Digital Workplace for Software & SaaS</title>
    <meta name="title" content="LISH — Digital Workplace for Software & SaaS" />
    <meta name="description" content="LISH builds digital experiences, SaaS, and software. Request services, collaborate, and launch with a modern team." />
    <meta name="keywords" content="project management, employee management, client portal, digital workspace, business platform, SaaS, software development" />
    <meta name="author" content="LISH" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#E8AEB7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="LISH" />
    
    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://yevdyhdifwwkbiulrzmk.supabase.co" />
    <link rel="dns-prefetch" href="https://yevdyhdifwwkbiulrzmk.supabase.co" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lish.vercel.app/" />
    <meta property="og:title" content="LISH — Digital Workplace" />
    <meta property="og:description" content="We build digital experiences, SaaS, and software." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:title" content="LISH — Digital Workplace" />
    <meta name="twitter:description" content="We build digital experiences, SaaS, and software." />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .catch(error => console.error('SW registration failed:', error));
        });
      }
    </script>
  </body>
</html>
